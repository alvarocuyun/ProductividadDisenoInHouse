<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Hub — BIA Restaurants</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fff;--sf:#f7f8fc;--sf2:#eef1f8;--sf3:#e4e8f5;
  --border:#e4e8f2;--border2:#cdd3e8;
  --tx:#0d1526;--tx2:#374166;--tx3:#7a85a8;
  --accent:#4361ee;--accent2:#3a0ca3;--acc-l:#eef0fd;
  --green:#059669;--green-l:#d1fae5;
  --amber:#d97706;--amber-l:#fef3c7;
  --blue:#2563eb;--blue-l:#dbeafe;
  --red:#dc2626;--red-l:#fee2e2;
  --violet:#7c3aed;--violet-l:#ede9fe;
  --gray:#6b7280;--gray-l:#f3f4f6;
  --sh:0 1px 3px rgba(13,21,38,.07);
  --sh-md:0 6px 24px rgba(13,21,38,.11);
  --r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--sf);color:var(--tx);font-size:14px;min-height:100vh}

/* ── TOPBAR ─────────────────────────────── */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);height:62px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.tl{display:flex;align-items:center;gap:14px}
.tlogo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tlogo svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.t-title{font-size:16px;font-weight:800;color:var(--tx);letter-spacing:-.025em}
.t-sub{font-size:11.5px;color:var(--tx3);margin-top:1px}
.tr{display:flex;align-items:center;gap:10px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);white-space:nowrap}
.chip.ok{background:var(--green-l);color:var(--green);border-color:#86efac}
.chip.loading{background:var(--blue-l);color:var(--blue);border-color:#93c5fd}
.chip.err{background:var(--red-l);color:var(--red);border-color:#fca5a5}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover:not(:disabled){background:var(--sf2);border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.5;cursor:default}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover:not(:disabled){background:var(--accent2);border-color:var(--accent2)}
.t-date{font-size:11.5px;color:var(--tx3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

/* ── UPLOAD ZONE ─────────────────────────── */
.upload-zone{margin:2rem auto;max-width:600px;border:2.5px dashed var(--border2);border-radius:var(--rl);padding:3rem 2rem;text-align:center;background:var(--bg);cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--acc-l)}
.upload-zone.loaded{border-style:solid;border-color:#86efac;background:var(--green-l)}
.uz-icon{font-size:48px;margin-bottom:16px}
.uz-title{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:8px}
.uz-sub{font-size:13.5px;color:var(--tx3);line-height:1.6}
.uz-sub label{color:var(--accent);font-weight:600;cursor:pointer}
.uz-file{font-size:13px;font-weight:600;color:var(--green);margin-top:12px}
input[type=file]{display:none}

/* ── PROGRESO DE CARGA ───────────────────── */
.prog-bar-wrap{background:var(--sf2);border-radius:3px;height:4px;overflow:hidden;margin-top:14px;display:none}
.prog-bar-wrap.show{display:block}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0%}
.loading-msg{font-size:12.5px;color:var(--blue);margin-top:8px;display:none}
.loading-msg.show{display:block}

/* ── BRAND TABS ──────────────────────────── */
.bnav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.btab{padding:13px 20px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx3);border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:8px}
.btab:hover{color:var(--tx2)}
.btab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.btab .n{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--sf2);color:var(--tx3);font-weight:500;transition:all .15s}
.btab.active .n{background:var(--acc-l);color:var(--accent)}
.btab.t-panda.active{color:#e63946;border-bottom-color:#e63946}
.btab.t-panda.active .n{background:#fde8ea;color:#e63946}
.btab.t-apb.active{color:#f4720b;border-bottom-color:#f4720b}
.btab.t-apb.active .n{background:#fff0e6;color:#f4720b}
.btab.t-barista.active{color:#166534;border-bottom-color:#166534}
.btab.t-barista.active .n{background:#dcfce7;color:#166534}
.btab.t-pdc.active{color:#7c3aed;border-bottom-color:#7c3aed}
.btab.t-pdc.active .n{background:#ede9fe;color:#7c3aed}

/* ── PAGE ────────────────────────────────── */
.page{padding:1.75rem 2rem;max-width:1700px;margin:0 auto}

/* ── KPI STRIP ───────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:1.5rem}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3.5px;background:var(--kc,var(--accent));border-radius:0 0 4px 4px}
.kpi-icon{font-size:22px;margin-bottom:10px}
.kpi-val{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.04em;color:var(--tx)}
.kpi-lbl{font-size:10.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:5px}
.kpi-sub{font-size:12px;color:var(--tx3);margin-top:4px}
.kpi-pct{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:8px;background:var(--kpb,var(--acc-l));color:var(--kpc,var(--accent))}

/* ── PROJECTION CARDS ────────────────────── */
.pcards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.75rem}
.pcard{border-radius:var(--rl);padding:22px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--sh-md)}
.pcard::before{content:'';position:absolute;top:-45px;right:-35px;width:140px;height:140px;background:rgba(255,255,255,.1);border-radius:50%;pointer-events:none}
.pcard::after{content:'';position:absolute;bottom:-25px;left:-20px;width:90px;height:90px;background:rgba(255,255,255,.07);border-radius:50%;pointer-events:none}
.pc-lbl{font-size:10.5px;font-weight:700;opacity:.75;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.pc-val{font-size:36px;font-weight:900;line-height:1;letter-spacing:-.04em}
.pc-sub{font-size:12px;opacity:.65;margin-top:6px;line-height:1.5}
.pc-badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.2);margin-top:12px}
.pc1{background:linear-gradient(135deg,#4361ee,#3a0ca3)}
.pc2{background:linear-gradient(135deg,#059669,#064e3b)}
.pc3{background:linear-gradient(135deg,#d97706,#92400e)}
.pc4{background:linear-gradient(135deg,#7c3aed,#4c1d95)}

/* ── GRID ─────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.75rem}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:1.75rem}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:22px;box-shadow:var(--sh)}
.ct{font-size:13.5px;font-weight:700;color:var(--tx);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ct .note{font-size:11px;color:var(--tx3);font-weight:400;margin-left:auto}

/* ── DONUT ───────────────────────────────── */
.dnut-wrap{display:flex;align-items:center;gap:24px}
.dl-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.dl-item:last-child{border-bottom:none}
.dl-l{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--tx2)}
.dl-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.dl-r{display:flex;align-items:center;gap:10px}
.dl-cnt{font-size:15px;font-weight:800;color:var(--tx)}
.dl-pct{font-size:12px;color:var(--tx3);min-width:40px;text-align:right;font-weight:600}

/* ── DESIGNER ROWS ───────────────────────── */
.des-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:var(--r);cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.des-row:last-child{border-bottom:none}
.des-row:hover{background:var(--sf)}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.di{flex:1;min-width:0}
.dn{font-size:13.5px;font-weight:700;color:var(--tx)}
.ds{font-size:11.5px;color:var(--tx3);margin-top:2px}
.dr{text-align:right;flex-shrink:0}
.dv{font-size:22px;font-weight:800;color:var(--tx);line-height:1}
.dp{font-size:11px;color:var(--tx3)}
.stk{display:flex;height:9px;border-radius:4px;overflow:hidden;gap:1px;margin-top:7px}
.seg{border-radius:2px}
.sleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.sli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3)}
.sld{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── BADGE ───────────────────────────────── */
.sb{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.s-fin{background:var(--green-l);color:var(--green)}
.s-proc{background:var(--amber-l);color:var(--amber)}
.s-rev{background:var(--blue-l);color:var(--blue)}
.s-sin{background:var(--gray-l);color:var(--gray)}
.s-atr{background:var(--red-l);color:var(--red)}

/* ── TABLE ───────────────────────────────── */
.tw{overflow-y:auto;border-radius:var(--r);border:1px solid var(--border)}
.pt{width:100%;border-collapse:collapse;font-size:12.5px}
.pt th{padding:9px 14px;text-align:left;font-size:10.5px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--sf);position:sticky;top:0;z-index:1}
.pt tbody tr{cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.pt tbody tr:last-child{border-bottom:none}
.pt tbody tr:hover td{background:var(--sf)}
.pt td{padding:9px 14px;color:var(--tx2);vertical-align:middle}
.pt td.pn{font-weight:600;color:var(--tx);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt td.nc{text-align:center;font-weight:700;color:var(--tx)}
.pc-wrap{display:flex;align-items:center;gap:8px}
.pc-track{flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden}
.pc-fill{height:100%;border-radius:3px}
.pc-pct{font-size:11.5px;font-weight:700;min-width:34px;text-align:right}

/* ── CHART ───────────────────────────────── */
.ch-wrap{position:relative;height:280px}
.ch-wrap-lg{position:relative;height:340px}

/* ── VIEW TABS (Dashboard / Detalle) ────── */
.vtabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 2rem;gap:2px}
.vtab{padding:11px 20px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx3);border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:7px}
.vtab:hover{color:var(--tx2)}
.vtab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── DETALLE PAGE ───────────────────────── */
.det-bar{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;padding:14px 2rem;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:110}
/* date range picker */
.date-range-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-range-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.det-date{padding:7px 10px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:12.5px;color:var(--tx2);background:var(--bg);outline:none;cursor:pointer;min-width:130px}
.det-date:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.det-date::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer}
.date-sep{font-size:12px;color:var(--tx3);font-weight:500}
.week-shortcuts{display:flex;gap:4px;flex-wrap:wrap}
.wshort{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;color:var(--tx3);transition:all .15s;white-space:nowrap}
.wshort:hover{border-color:var(--accent);color:var(--accent);background:var(--acc-l)}
.wshort.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* período activo badge en topbar del detalle */
.period-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--acc-l);color:var(--accent);font-size:11px;font-weight:700;border:1px solid var(--accent);white-space:nowrap}
.period-badge .pb-x{cursor:pointer;opacity:.7;margin-left:2px}
.period-badge .pb-x:hover{opacity:1}
.det-sel{padding:8px 12px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--tx2);background:var(--bg);cursor:pointer;outline:none;min-width:150px}
.det-sel:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.det-sw{position:relative;flex:1;min-width:200px;max-width:360px}
.det-sw .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx3)}
.det-inp{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--tx2);background:var(--bg);outline:none}
.det-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.det-cnt{font-size:12px;color:var(--tx3);margin-left:auto;white-space:nowrap}
.det-clr{padding:7px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:12.5px;color:var(--tx3);background:var(--bg);cursor:pointer;transition:all .15s}
.det-clr:hover{border-color:var(--red);color:var(--red)}
.sf-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sf-lbl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.sfb{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--tx3)}
.sfb:hover{opacity:.85}
.sfb.on-fin{background:var(--green-l);color:var(--green);border-color:#86efac}
.sfb.on-rev{background:var(--blue-l);color:var(--blue);border-color:#93c5fd}
.sfb.on-proc{background:var(--amber-l);color:var(--amber);border-color:#fcd34d}
.sfb.on-sin{background:var(--gray-l);color:var(--gray);border-color:#d1d5db}
.sfb.on-atr{background:var(--red-l);color:var(--red);border-color:#fca5a5}
.det-page{padding:1.5rem 2rem;max-width:1700px;margin:0 auto}
.det-tbl-wrap{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;background:var(--bg);box-shadow:var(--sh)}
.det-tbl{width:100%;border-collapse:collapse;font-size:13px}
.det-tbl th{padding:10px 14px;text-align:left;font-size:10.5px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border);background:var(--sf);white-space:nowrap;cursor:pointer;user-select:none;transition:color .1s}
.det-tbl th:hover{color:var(--accent)}
.det-tbl th .sort-ico{font-size:10px;margin-left:4px;opacity:.5}
.det-tbl th.sorted .sort-ico{opacity:1;color:var(--accent)}
.det-tbl tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.det-tbl tbody tr:last-child{border-bottom:none}
.det-tbl tbody tr:hover td{background:var(--sf)}
.det-tbl td{padding:9px 14px;color:var(--tx2);vertical-align:middle}
.td-brand-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0}
.td-brand{font-weight:600;font-size:12.5px;display:flex;align-items:center}
.td-des{font-weight:700;color:var(--tx)}
.td-proj{color:var(--tx);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.td-task{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-week{font-size:11.5px;color:var(--tx3);white-space:nowrap}
.det-empty{text-align:center;padding:5rem 1rem;color:var(--tx3)}
.det-empty .ei{font-size:44px;margin-bottom:14px}
.det-empty h3{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:6px}

/* ── CAPACITY BOXES ─────────────────────── */
.cap-box{border-radius:var(--r);padding:16px;margin-bottom:14px}
.cap-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;opacity:.8}
.cap-val{font-size:30px;font-weight:900;line-height:1;letter-spacing:-.04em}
.cap-sub{font-size:12px;opacity:.75;margin-top:5px}

/* ── DRAWER ──────────────────────────────── */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:300;backdrop-filter:blur(2px)}
.ovl.open{display:block}
.drw{position:fixed;top:0;right:-100%;bottom:0;width:min(760px,96vw);background:var(--bg);box-shadow:var(--sh-md);z-index:301;transition:right .28s cubic-bezier(.25,1,.5,1);display:flex;flex-direction:column}
.drw.open{right:0}
.dh{padding:1.5rem 1.75rem 1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;flex-shrink:0;position:relative}
.dh h2{font-size:16px;font-weight:800;color:#fff;line-height:1.3;letter-spacing:-.02em;padding-right:36px}
.dh-meta{font-size:12px;color:rgba(255,255,255,.6);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
.dh-kpis{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.dk{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 14px;text-align:center;min-width:65px}
.dkv{font-size:20px;font-weight:800;color:#fff;line-height:1}
.dkl{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;font-weight:600}
.dcl{position:absolute;top:1rem;right:1.25rem;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.dcl:hover{background:rgba(255,255,255,.3)}
.db{flex:1;overflow-y:auto}
.ds-sec{padding:16px 20px;border-bottom:1px solid var(--border)}
.ds-sec-title{font-size:11.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.dtask{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.dtask:last-child{border-bottom:none}
.dtask-name{flex:1;font-size:12.5px;color:var(--tx2);line-height:1.4}
.dtask-wk{font-size:11px;color:var(--tx3);white-space:nowrap;padding-left:8px;margin-top:1px}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}.pcards{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}

<script>
/* ═══════════════════════════════════════════════════════════════
   DESIGN HUB DASHBOARD  —  BIA Restaurants
   Lee el Excel directo en el navegador usando SheetJS (CDN)
   Funciona abriendo el HTML como archivo local (file://)
   ═══════════════════════════════════════════════════════════════ */

/* ── CONSTANTES ─────────────────────────────────────────────── */
const STATUS_ORDER  = ['Finalizado','En revisión','En proceso','Sin iniciar','Atrasado'];
const STATUS_NORM   = {'En procesos':'En proceso'};
const STATUS_COLORS = {
  'Finalizado': {hex:'#059669',bg:'#d1fae5',tx:'#065f46',cls:'s-fin'},
  'En revisión':{hex:'#2563eb',bg:'#dbeafe',tx:'#1e40af',cls:'s-rev'},
  'En proceso': {hex:'#d97706',bg:'#fef3c7',tx:'#92400e',cls:'s-proc'},
  'Sin iniciar':{hex:'#9ca3af',bg:'#f3f4f6',tx:'#4b5563',cls:'s-sin'},
  'Atrasado':   {hex:'#dc2626',bg:'#fee2e2',tx:'#991b1b',cls:'s-atr'},
};
const BRAND_META = {
  'Panda Express':  {color:'#e63946',light:'#fde8ea',emoji:'🐼',tab:'t-panda'},
  'Applebees':      {color:'#f4720b',light:'#fff0e6',emoji:'🍔',tab:'t-apb'},
  'Café Barista':   {color:'#166534',light:'#dcfce7',emoji:'☕',tab:'t-barista'},
  'Punta del Cielo':{color:'#7c3aed',light:'#ede9fe',emoji:'🏔',tab:'t-pdc'},
};
const DES_COLORS = ['#4361ee','#e63946','#166534','#f4720b','#7c3aed','#d97706','#059669','#0891b2'];
const MONTHS_ES  = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};

/* ── ESTADO ─────────────────────────────────────────────────── */
let DATA       = {};   // Datos agregados por marca
let FLAT_TASKS = [];   // Todas las tareas planas: {brand, responsable, proyecto, tarea, semana, status, semanaDate}
let currentBrand = 'ALL';
let chartRefs = {};
let xlsxLoaded = false;

/* ═══════════════════════════════════════════════════════════════
   CARGA DEL ARCHIVO EXCEL (en el navegador)
   ═══════════════════════════════════════════════════════════════ */
function loadXLSX(cb){
  if(xlsxLoaded){ cb(); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=()=>{ xlsxLoaded=true; cb(); };
  s.onerror=()=>alert('No se pudo cargar la librería de Excel. Necesitas conexión a internet la primera vez.');
  document.head.appendChild(s);
}

// Drag & drop
const uz = document.getElementById('upload-zone');
uz.addEventListener('dragover', e=>{ e.preventDefault(); uz.classList.add('drag'); });
uz.addEventListener('dragleave', ()=> uz.classList.remove('drag'));
uz.addEventListener('drop', e=>{
  e.preventDefault(); uz.classList.remove('drag');
  const f = Array.from(e.dataTransfer.files).find(f=>/\.xlsx?$/i.test(f.name));
  if(f) processFile(f);
});
document.getElementById('file-input').addEventListener('change', e=>{
  if(e.target.files[0]) processFile(e.target.files[0]);
});

function processFile(file){
  setChip('loading','⏳ Cargando…');
  document.getElementById('uz-file').textContent='';
  document.getElementById('prog-wrap').classList.add('show');
  document.getElementById('loading-msg').classList.add('show');
  document.getElementById('prog-bar').style.width='15%';

  loadXLSX(()=>{
    const reader = new FileReader();
    reader.onload = e=>{
      document.getElementById('prog-bar').style.width='50%';
      setTimeout(()=>{
        try{
          const wb   = XLSX.read(e.target.result, {type:'array',cellDates:false,cellNF:false,cellStyles:false});
          document.getElementById('prog-bar').style.width='75%';
          const raw  = parseWorkbook(wb);
          // Guardar tasks planas completas para gráfica comparativa y vista detalle
          FLAT_TASKS = [];
          Object.entries(raw).forEach(([brand,tasks])=>{
            tasks.forEach(t=>FLAT_TASKS.push({
              brand,
              responsable: t.responsable,
              proyecto:    t.proyecto,
              tarea:       t.tarea,
              semana:      t.semana,
              status:      t.status,
              semanaDate:  weekDate(t.semana)||'',
            }));
          });
          DATA       = aggregate(raw);
          document.getElementById('prog-bar').style.width='100%';
          setTimeout(()=>{
            document.getElementById('prog-wrap').classList.remove('show');
            document.getElementById('loading-msg').classList.remove('show');
            showDashboard(file.name);
          },300);
        } catch(err){
          console.error(err);
          setChip('err','❌ Error al procesar');
          document.getElementById('loading-msg').classList.remove('show');
          document.getElementById('prog-wrap').classList.remove('show');
          alert('Error al procesar el Excel: '+err.message);
        }
      },50);
    };
    reader.readAsArrayBuffer(file);
  });
}

function showDashboard(filename){
  const total = Object.values(DATA).reduce((s,d)=>s+d.total,0);
  setChip('ok',`✓ ${total.toLocaleString()} tareas · ${filename}`);
  document.getElementById('tdate').textContent = new Date().toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('btn-reload').disabled = false;
  document.getElementById('upload-zone').style.display='none';
  document.getElementById('vtabs-wrap').style.display='block';
  document.getElementById('dash').style.display='block';
  // Poblar filtros del detalle
  buildDetailFilters();
  currentBrand='ALL';
  currentView='dashboard';
  buildNav();
  renderPage();
}

/* Recargar: vuelve a mostrar zona de carga */
function loadData(){
  destroyCharts();
  DATA={};
  FLAT_TASKS=[];
  document.getElementById('upload-zone').style.display='block';
  document.getElementById('upload-zone').className='upload-zone';
  document.getElementById('vtabs-wrap').style.display='none';
  document.getElementById('det-bar').style.display='none';
  document.getElementById('dash').style.display='none';
  document.getElementById('btn-reload').disabled=true;
  document.getElementById('uz-file').textContent='';
  document.getElementById('file-input').value='';
  setChip('loading','⏳ Sin datos');
  document.getElementById('tdate').textContent='';
}

/* ═══════════════════════════════════════════════════════════════
   PARSER EXCEL → DATOS RAW
   ═══════════════════════════════════════════════════════════════ */
function parseWorkbook(wb){
  const raw={};
  for(const sn of wb.SheetNames){
    if(/^(notas?|notes?)$/i.test(sn.trim())) continue;
    const ws = wb.Sheets[sn];
    const tasks=[], rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
    let curWeek='Sin semana', curProj='Sin proyecto';
    const VALID=new Set(['Sin iniciar','En proceso','En revisión','Finalizado','Atrasado','En procesos']);

    for(const row of rows){
      if(!row.some(c=>c)) continue;
      const c=row.map(v=>String(v??'').trim());
      const c0=c[0]||'', c1=c[1]||'', c2=c[2]||'', c6=c[6]||'';
      if(c0.toLowerCase().startsWith('semana')){ curWeek=c0; continue; }
      if(!c0&&c1&&!VALID.has(c6)){ curProj=c1; continue; }
      const st=STATUS_NORM[c6]??c6;
      if(c0&&VALID.has(st)){
        tasks.push({semana:curWeek,proyecto:curProj,responsable:c0,tarea:(c1||c2).slice(0,80),status:st});
      }
    }
    raw[sn]=tasks;
  }
  return raw;
}

/* ═══════════════════════════════════════════════════════════════
   AGREGACIÓN
   ═══════════════════════════════════════════════════════════════ */
function ss(tasks){
  const s={};STATUS_ORDER.forEach(st=>s[st]=0);
  tasks.forEach(t=>{if(s[t.status]!==undefined)s[t.status]++;});
  return s;
}
function weekDate(str){
  const m=str.match(/(\d+)\s+de\s+(\w+)(?:\s+de\s+(\d{4}))?/i);
  if(!m) return null;
  const mon=MONTHS_ES[m[2].toLowerCase()]; if(!mon) return null;
  return `${m[3]||2026}-${String(mon).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
}
function groupBy(arr,k){return arr.reduce((m,x)=>{(m[x[k]]=m[x[k]]||[]).push(x);return m;},{});}

function aggregate(raw){
  const out={};
  for(const [brand,tasks] of Object.entries(raw)){
    const stats=ss(tasks);
    // Diseñadores
    const byDes=groupBy(tasks,'responsable');
    const designers=Object.entries(byDes)
      .filter(([k])=>k).sort((a,b)=>b[1].length-a[1].length)
      .map(([des,dt])=>{
        const ds=ss(dt);
        const byP=groupBy(dt,'proyecto');
        const projects=Object.entries(byP).filter(([k])=>k&&k!=='Sin proyecto')
          .sort((a,b)=>b[1].length-a[1].length)
          .map(([pn,pt])=>({n:pn.slice(0,70),t:pt.length,s:ss(pt),
            tasks:pt.slice(0,60).map(t=>({ta:t.tarea,st:t.status,wk:t.semana.slice(0,40)}))}));
        return{name:des,total:dt.length,pct:tasks.length?Math.round(dt.length/tasks.length*100):0,s:ds,projects};
      });
    // Proyectos
    const byProj=groupBy(tasks,'proyecto');
    const projects=Object.entries(byProj).filter(([k])=>k&&k!=='Sin proyecto')
      .sort((a,b)=>b[1].length-a[1].length)
      .map(([pn,pt])=>{const ps=ss(pt);return{n:pn.slice(0,70),t:pt.length,
        fp:pt.length?Math.round((ps['Finalizado']||0)/pt.length*100):0,s:ps,
        d:[...new Set(pt.map(t=>t.responsable).filter(Boolean))]};});
    // Semanal
    const byW={}; tasks.forEach(t=>{
      if(!byW[t.semana])byW[t.semana]={t:0,f:0,dt:weekDate(t.semana),l:t.semana.slice(0,40)};
      byW[t.semana].t++;if(t.status==='Finalizado')byW[t.semana].f++;
    });
    const weekly=Object.values(byW).filter(w=>w.dt).sort((a,b)=>a.dt.localeCompare(b.dt));
    const rec=weekly.slice(-8); const avg=rec.length?rec.reduce((s,w)=>s+w.t,0)/rec.length:0;
    const avgF=rec.length?rec.reduce((s,w)=>s+w.f,0)/rec.length:0;
    const trend=rec.length>1?(rec[rec.length-1].t-rec[0].t)/(rec.length-1):0;
    out[brand]={total:tasks.length,stats,designers,projects:projects.slice(0,60),
      weekly:weekly.slice(-20).map(w=>({d:w.dt,t:w.t,f:w.f,l:w.l})),
      proj:{avg:+avg.toFixed(1),fin:+avgF.toFixed(1),trend:+trend.toFixed(1),
            w4:Math.round(avg*4),rate:avg?Math.round(avgF/avg*100):0}};
  }
  return out;
}

/* ═══════════════════════════════════════════════════════════════
   HELPERS DE DATOS FILTRADOS
   ═══════════════════════════════════════════════════════════════ */
function allStats(){
  if(currentBrand!=='ALL') return DATA[currentBrand]?.stats||{};
  const s={};STATUS_ORDER.forEach(st=>s[st]=0);
  Object.values(DATA).forEach(d=>STATUS_ORDER.forEach(st=>s[st]+=(d.stats[st]||0)));
  return s;
}
function allTotal(){ return currentBrand==='ALL'?Object.values(DATA).reduce((s,d)=>s+d.total,0):(DATA[currentBrand]?.total||0); }
function allDesigners(){
  if(currentBrand!=='ALL') return DATA[currentBrand]?.designers||[];
  const map={};
  Object.values(DATA).forEach(d=>(d.designers||[]).forEach(des=>{
    if(!map[des.name]) map[des.name]={name:des.name,total:0,pct:0,s:{},projects:[]};
    map[des.name].total+=des.total;
    STATUS_ORDER.forEach(st=>map[des.name].s[st]=(map[des.name].s[st]||0)+(des.s[st]||0));
    map[des.name].projects.push(...des.projects);
  }));
  const tot=allTotal();
  return Object.values(map).sort((a,b)=>b.total-a.total)
    .map(d=>({...d,pct:tot?Math.round(d.total/tot*100):0}));
}
function allProjects(){
  if(currentBrand!=='ALL') return DATA[currentBrand]?.projects||[];
  const map={};
  Object.values(DATA).forEach(d=>(d.projects||[]).forEach(p=>{
    if(!map[p.n]) map[p.n]={n:p.n,t:0,s:{},d:[]};
    map[p.n].t+=p.t;
    STATUS_ORDER.forEach(st=>map[p.n].s[st]=(map[p.n].s[st]||0)+(p.s[st]||0));
    map[p.n].d=[...new Set([...map[p.n].d,...p.d])];
  }));
  return Object.values(map).sort((a,b)=>b.t-a.t)
    .map(p=>({...p,fp:p.t?Math.round((p.s['Finalizado']||0)/p.t*100):0}));
}
function allWeekly(){
  if(currentBrand!=='ALL'){return(DATA[currentBrand]?.weekly||[]);}
  const map={};
  Object.values(DATA).forEach(d=>(d.weekly||[]).forEach(w=>{
    if(!map[w.d]) map[w.d]={d:w.d,t:0,f:0,l:w.l};
    map[w.d].t+=w.t; map[w.d].f+=w.f;
  }));
  return Object.values(map).sort((a,b)=>a.d.localeCompare(b.d));
}
function getProj(){
  if(currentBrand!=='ALL'){return DATA[currentBrand]?.proj;}
  const wk=allWeekly(), rec=wk.slice(-8);
  if(!rec.length) return null;
  const avg=rec.reduce((s,w)=>s+w.t,0)/rec.length;
  const fin=rec.reduce((s,w)=>s+w.f,0)/rec.length;
  const trend=rec.length>1?(rec[rec.length-1].t-rec[0].t)/(rec.length-1):0;
  return{avg:+avg.toFixed(1),fin:+fin.toFixed(1),trend:+trend.toFixed(1),
         w4:Math.round(avg*4),rate:avg?Math.round(fin/avg*100):0};
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════════ */
function setBrand(b){ currentBrand=b; destroyCharts(); buildNav(); renderPage(); }

function renderPage(){
  const stats=allStats(), total=allTotal(), designers=allDesigners();
  const projects=allProjects(), weekly=allWeekly(), proj=getProj();
  document.getElementById('page').innerHTML=`
    ${renderKPIs(stats,total,designers)}
    ${renderProjCards(proj,designers,total)}
    <div class="g2">${renderDonut(stats,total)}${renderDesigners(designers)}</div>
    ${renderComparativeChart()}
    <div class="g3">${renderWeekly()}${renderCapacity(stats,total,designers,proj)}</div>
    ${renderProjects(projects)}`;
  setTimeout(()=>{buildDonut(stats,total);buildWeeklyChart(weekly,proj);buildComparativeChart();},40);
}

/* KPIs */
function renderKPIs(st,tot,des){
  const fin=st['Finalizado']||0, rev=st['En revisión']||0;
  const proc=st['En proceso']||0, sin=st['Sin iniciar']||0, atr=st['Atrasado']||0;
  const fp=tot?Math.round(fin/tot*100):0;
  const kpis=[
    {ico:'📋',val:tot.toLocaleString(),lbl:'Tareas totales',sub:`${des.length} diseñadores activos`,kc:'#4361ee'},
    {ico:'✅',val:fin.toLocaleString(),lbl:'Finalizadas',sub:`${fp}% completado`,pct:fp,pb:'#d1fae5',pc:'#059669',kc:'#059669'},
    {ico:'🔍',val:rev.toLocaleString(),lbl:'En revisión',sub:`${tot?Math.round(rev/tot*100):0}% del total`,pct:tot?Math.round(rev/tot*100):0,pb:'#dbeafe',pc:'#2563eb',kc:'#2563eb'},
    {ico:'⚡',val:proc.toLocaleString(),lbl:'En proceso',sub:`${tot?Math.round(proc/tot*100):0}% del total`,pct:tot?Math.round(proc/tot*100):0,pb:'#fef3c7',pc:'#d97706',kc:'#d97706'},
    {ico:'⏳',val:sin.toLocaleString(),lbl:'Sin iniciar',sub:`${tot?Math.round(sin/tot*100):0}% pendiente`,pct:tot?Math.round(sin/tot*100):0,pb:'#f3f4f6',pc:'#6b7280',kc:'#9ca3af'},
    {ico:'⚠️',val:atr.toLocaleString(),lbl:'Atrasadas',sub:atr>0?'Requieren atención':'Sin atrasos',pct:tot?Math.round(atr/tot*100):0,pb:'#fee2e2',pc:'#dc2626',kc:atr>0?'#dc2626':'#9ca3af'},
  ];
  return `<div class="kpi-row">${kpis.map(k=>`<div class="kpi" style="--kc:${k.kc}">
    <div class="kpi-icon">${k.ico}</div>

  return `<div class="card"><div class="ct">📈 Evolutivo semanal <span class="note">+ proyección 4 semanas</span></div>

function buildWeeklyChart(weekly,proj){
  const ctx=document.getElementById('weekly-cv'); if(!ctx) return;
  const last=weekly.slice(-16);
  const projWks=[];
  if(proj&&last.length){
    const lastD=new Date(last[last.length-1].d);
    for(let i=1;i<=4;i++){
      const d=new Date(lastD); d.setDate(d.getDate()+i*7);
      projWks.push({d:d.toISOString().slice(0,10),t:Math.max(0,Math.round(proj.avg+proj.trend*i)),
        f:Math.round(proj.fin),proj:true});
    }
  }
  const all=[...last,...projWks];
  const lbl=all.map(w=>{ const d=new Date(w.d); return d.toLocaleDateString('es-GT',{day:'2-digit',month:'short'}); });
  chartRefs.weekly=new Chart(ctx,{type:'bar',
    data:{labels:lbl,datasets:[

        backgroundColor:all.map(w=>w.proj?'rgba(5,150,105,.28)':'rgba(5,150,105,.8)'),

      {label:'Otras',data:all.map(w=>Math.max(0,w.t-w.f)),
        backgroundColor:all.map(w=>w.proj?'rgba(99,102,241,.18)':'rgba(99,102,241,.6)'),
        borderColor:all.map(w=>w.proj?'rgba(99,102,241,.4)':'#6366f1'),
        borderWidth:1.5,borderRadius:5,borderSkipped:false,stack:'s'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}},
        tooltip:{mode:'index',intersect:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:40}},
        y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:11}},beginAtZero:true}}}});
}

/* ═══════════════════════════════════════════════════════
   GRÁFICA COMPARATIVA DE DISEÑADORES
   ═══════════════════════════════════════════════════════ */
function renderComparativeChart(){
  return `<div class="card" style="margin-bottom:1.75rem">
    <div class="ct">👥 Evolutivo comparativo — carga por diseñador <span class="note">tareas por semana · área apilada</span></div>
    <div class="ch-wrap-lg"><canvas id="comp-cv"></canvas></div>
  </div>`;
}

function buildComparativeChart(){
  const ctx = document.getElementById('comp-cv'); if(!ctx) return;

  // Usar tasks filtradas por marca si aplica
  const tasks = getAllFlatTasksFiltered();
  if(!tasks.length) return;

  // Obtener semanas únicas ordenadas (últimas 18)
  const weekMap = {};
  tasks.forEach(t=>{
    if(!t.semanaDate) return;
    if(!weekMap[t.semanaDate]) weekMap[t.semanaDate]={date:t.semanaDate,label:''};
    weekMap[t.semanaDate].label = t.semana.slice(0,30);
  });
  const weeks = Object.values(weekMap).sort((a,b)=>a.date.localeCompare(b.date)).slice(-18);
  if(!weeks.length) return;

  const weekDates = new Set(weeks.map(w=>w.date));

  // Diseñadores únicos (ordenados por volumen total)
  const desCounts = {};
  tasks.forEach(t=>{ if(t.responsable) desCounts[t.responsable]=(desCounts[t.responsable]||0)+1; });
  const designers = Object.entries(desCounts).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n])=>n);

  // Contar tareas por semana×diseñador
  const matrix = {}; // weekDate → desName → count
  weeks.forEach(w=>{ matrix[w.date]={}; designers.forEach(d=>matrix[w.date][d]=0); });
  tasks.forEach(t=>{
    if(!t.semanaDate||!weekDates.has(t.semanaDate)||!t.responsable) return;
    if(matrix[t.semanaDate]&&matrix[t.semanaDate][t.responsable]!==undefined)
      matrix[t.semanaDate][t.responsable]++;
  });

  const labels = weeks.map(w=>{
    const d=new Date(w.date+'T12:00:00');
    return d.toLocaleDateString('es-GT',{day:'2-digit',month:'short'});
  });

  const datasets = designers.map((des,i)=>({
    label: des,
    data: weeks.map(w=>matrix[w.date][des]||0),
    borderColor: DES_COLORS[i%DES_COLORS.length],
    backgroundColor: DES_COLORS[i%DES_COLORS.length]+'28',
    borderWidth: 2.5,
    pointRadius: 4,
    pointHoverRadius: 7,
    fill: false,
    tension: 0.35,
  }));

  chartRefs.comp = new Chart(ctx,{
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:12,padding:18,font:{size:12}}},
        tooltip:{callbacks:{
          title: t=>'Semana del '+labels[t[0].dataIndex],
          label: c=>`${c.dataset.label}: ${c.raw} tareas`
        }}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},maxRotation:40}},
        y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:11},stepSize:1},beginAtZero:true,
           title:{display:true,text:'Tareas por semana',font:{size:11},color:'#7a85a8'}},
      }
    }
  });
}

function getAllFlatTasks(){
  // Si hay filtro de marca activo en el dashboard, respetarlo solo en gráfica comparativa
  // En detalle de tareas siempre devolver todo para que los filtros propios funcionen
  return FLAT_TASKS;
}

function getAllFlatTasksFiltered(){
  // Para la gráfica comparativa: respetar marca y período de fechas si están activos
  let tasks = currentBrand==='ALL' ? FLAT_TASKS : FLAT_TASKS.filter(t=>t.brand===currentBrand);
  const {from, to} = getDateRange();
  if(from) tasks = tasks.filter(t=>t.semanaDate && t.semanaDate>=from);
  if(to)   tasks = tasks.filter(t=>t.semanaDate && t.semanaDate<=to);
  return tasks;
}

/* ── FILTRO DE FECHAS ── */
function getDateRange(){
  const from = document.getElementById('f-date-from')?.value||'';
  const to   = document.getElementById('f-date-to')?.value||'';
  return {from, to};
}

function onDateChange(){
  // Al cambiar manualmente las fechas, quitar el shortcut activo
  activeShortcut='';
  ['ws-4','ws-8','ws-12','ws-ytd','ws-all'].forEach(id=>document.getElementById(id).classList.remove('active'));
  updatePeriodBadge();
  applyFilters();
}

function setWeekShortcut(nWeeks){
  const id='ws-'+nWeeks;
  activeShortcut = activeShortcut===id ? '' : id;
  ['ws-4','ws-8','ws-12','ws-ytd','ws-all'].forEach(i=>document.getElementById(i).classList.remove('active'));
  if(activeShortcut){
    document.getElementById(id).classList.add('active');
    const to   = new Date();
    const from = new Date(); from.setDate(from.getDate() - nWeeks*7);
    document.getElementById('f-date-from').value = from.toISOString().slice(0,10);
    document.getElementById('f-date-to').value   = to.toISOString().slice(0,10);
  } else {
    document.getElementById('f-date-from').value='';
    document.getElementById('f-date-to').value='';
  }
  updatePeriodBadge();
  applyFilters();
}

function setShortcutYTD(){
  const id='ws-ytd';
  activeShortcut = activeShortcut===id ? '' : id;
  ['ws-4','ws-8','ws-12','ws-ytd','ws-all'].forEach(i=>document.getElementById(i).classList.remove('active'));
  if(activeShortcut){
    document.getElementById(id).classList.add('active');
    const yr = new Date().getFullYear();
    document.getElementById('f-date-from').value = `${yr}-01-01`;
    document.getElementById('f-date-to').value   = new Date().toISOString().slice(0,10);
  } else {
    document.getElementById('f-date-from').value='';
    document.getElementById('f-date-to').value='';
  }
  updatePeriodBadge();
  applyFilters();
}

function setShortcutAll(){
  const id='ws-all';
  activeShortcut = activeShortcut===id ? '' : id;
  ['ws-4','ws-8','ws-12','ws-ytd','ws-all'].forEach(i=>document.getElementById(i).classList.remove('active'));
  if(activeShortcut){
    document.getElementById(id).classList.add('active');
    // Rango completo de los datos
    const dates = FLAT_TASKS.map(t=>t.semanaDate).filter(Boolean).sort();
    if(dates.length){
      document.getElementById('f-date-from').value = dates[0];
      document.getElementById('f-date-to').value   = dates[dates.length-1];
    }
  } else {
    document.getElementById('f-date-from').value='';
    document.getElementById('f-date-to').value='';
  }
  updatePeriodBadge();
  applyFilters();
}

function updatePeriodBadge(){
  const from = document.getElementById('f-date-from')?.value||'';
  const to   = document.getElementById('f-date-to')?.value||'';
  const wrap = document.getElementById('period-badge-wrap');
  if(!wrap) return;
  if(!from && !to){ wrap.innerHTML=''; return; }
  const fmt = d => new Date(d+'T12:00:00').toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'numeric'});
  const label = (from&&to) ? `${fmt(from)} → ${fmt(to)}` : from ? `Desde ${fmt(from)}` : `Hasta ${fmt(to)}`;
  wrap.innerHTML=`<span class="period-badge">📅 ${label} <span class="pb-x" onclick="clearDateFilter()">✕</span></span>`;
}

function clearDateFilter(){
  document.getElementById('f-date-from').value='';
  document.getElementById('f-date-to').value='';
  activeShortcut='';
  ['ws-4','ws-8','ws-12','ws-ytd','ws-all'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('period-badge-wrap').innerHTML='';
  applyFilters();
}

function applyFilters(){
  if(currentView!=='detalle') return;
  renderDetail();
}

function renderDetail(){
  const brand  = document.getElementById('f-brand')?.value||'';
  const des    = document.getElementById('f-des')?.value||'';
  const txt    = (document.getElementById('f-text')?.value||'').toLowerCase();
  const {from, to} = getDateRange();

  // FLAT_TASKS tiene: {brand, responsable, proyecto, tarea, semana, status, semanaDate}
  let rows = FLAT_TASKS;

  if(brand)               rows = rows.filter(r=>r.brand===brand);
  if(des)                 rows = rows.filter(r=>r.responsable===des);
  if(txt)                 rows = rows.filter(r=>
    r.proyecto.toLowerCase().includes(txt) || r.tarea.toLowerCase().includes(txt));
  if(activeStatus.size>0) rows = rows.filter(r=>activeStatus.has(r.status));

  // Filtro de período: por semanaDate
  if(from) rows = rows.filter(r=> r.semanaDate && r.semanaDate >= from);
  if(to)   rows = rows.filter(r=> r.semanaDate && r.semanaDate <= to);

  // Ordenar
  rows = [...rows].sort((a,b)=>{
    let va,vb;
    if(sortCol==='brand')       { va=a.brand;       vb=b.brand; }
    else if(sortCol==='des')    { va=a.responsable; vb=b.responsable; }
    else if(sortCol==='proj')   { va=a.proyecto;    vb=b.proyecto; }
    else if(sortCol==='task')   { va=a.tarea;       vb=b.tarea; }
    else if(sortCol==='status') {
      va=STATUS_ORDER.indexOf(a.status); vb=STATUS_ORDER.indexOf(b.status);
      return (va-vb)*sortDir;
    }
    else if(sortCol==='week')   { va=a.semanaDate||''; vb=b.semanaDate||''; }
    else                        { va=a.brand;       vb=b.brand; }
    return va<vb?-sortDir : va>vb?sortDir : 0;
  });

  document.getElementById('det-cnt').textContent=`${rows.length.toLocaleString()} tareas encontradas`;

  const wrap=document.getElementById('det-page-wrap');
  if(!wrap) return;

  if(!rows.length){
    wrap.innerHTML=`<div style="padding:1.5rem 2rem"><div class="det-empty">
      <div class="ei">🔍</div><h3>Sin resultados</h3>
      <p>Prueba cambiando los filtros o limpiando la búsqueda</p>
    </div></div>`;
    return;
  }

  const sortArrow = col => sortCol===col ? (sortDir===1?' ↑':' ↓') : ' ↕';
  const thCls     = col => sortCol===col ? ' sorted' : '';
  const shown     = rows.slice(0,500);

  const tblRows = shown.map(r=>{
    const m = BRAND_META[r.brand]||{color:'#9ca3af',emoji:''};
    const dLabel = r.semanaDate
      ? new Date(r.semanaDate+'T12:00:00').toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'2-digit'})
      : (r.semana?.slice(0,28)||'—');
    return `<tr>
      <td class="td-brand"><span class="td-brand-dot" style="background:${m.color}"></span>${m.emoji} ${r.brand}</td>
      <td class="td-des">${r.responsable}</td>
      <td class="td-proj" title="${r.proyecto}">${r.proyecto}</td>
      <td class="td-task" title="${r.tarea}">${r.tarea||'—'}</td>
      <td><span class="sb ${STATUS_COLORS[r.status]?.cls||'s-sin'}">${r.status}</span></td>
      <td class="td-week">${dLabel}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML=`<div style="padding:1.5rem 2rem">
    ${rows.length>500?`<div style="background:var(--amber-l);color:var(--amber);padding:10px 16px;border-radius:var(--r);margin-bottom:14px;font-size:12.5px;font-weight:600">
      ⚠ Mostrando primeras 500 de ${rows.length.toLocaleString()} tareas. Refina los filtros.</div>`:''}
    <div class="det-tbl-wrap">
      <table class="det-tbl">
        <thead><tr>
          <th class="sortable${thCls('brand')}"  onclick="setSort('brand')">Marca<span class="sort-ico">${sortArrow('brand')}</span></th>
          <th class="sortable${thCls('des')}"    onclick="setSort('des')">Diseñador<span class="sort-ico">${sortArrow('des')}</span></th>
          <th class="sortable${thCls('proj')}"   onclick="setSort('proj')">Proyecto<span class="sort-ico">${sortArrow('proj')}</span></th>
          <th class="sortable${thCls('task')}"   onclick="setSort('task')">Tarea<span class="sort-ico">${sortArrow('task')}</span></th>
          <th class="sortable${thCls('status')}" onclick="setSort('status')">Status<span class="sort-ico">${sortArrow('status')}</span></th>
          <th class="sortable${thCls('week')}"   onclick="setSort('week')">Semana<span class="sort-ico">${sortArrow('week')}</span></th>
        </tr></thead>
        <tbody>${tblRows}</tbody>
      </table>
    </div>
  </div>`;
}

function setSort(col){
  if(sortCol===col) sortDir*=-1; else{ sortCol=col; sortDir=1; }
  renderDetail();
}

function destroyCharts(){ Object.values(chartRefs).forEach(c=>c?.destroy&&c.destroy()); chartRefs={}; }
function setChip(cls,txt){ const c=document.getElementById('chip'); c.className='chip '+cls; c.textContent=txt; }
</script>
</body>
</html>
